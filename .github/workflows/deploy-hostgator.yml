name: Publicar Drive Learn na HostGator

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: hostgator-drive-learn-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy do sistema PHP
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v6

      - name: Preparar a configuracao do banco
        env:
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_DATABASE: ${{ secrets.HOSTGATOR_DB_NAME }}
          DB_USERNAME: ${{ secrets.HOSTGATOR_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.HOSTGATOR_DB_PASSWORD }}
        run: php scripts/create-production-config.php

      - name: Publicar na HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          username: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./drive-learn-vwco.luxsolution.com.br/
          security: strict
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.agents/**
            **/README.md
            **/database/**
            **/scripts/**
            **/storage/sessions/**
            **/uploads/**

name: Publicar na HostGator

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostgator-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build e deploy
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v6

      - name: Preparar o Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar o site estatico
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Publicar na HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTGATOR_FTP_SERVER }}
          username: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./drive-learn-vwco.luxsolution.com.br/
          security: strict
          timeout: 120000

